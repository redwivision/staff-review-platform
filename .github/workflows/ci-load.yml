name: CI Load and UI Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Cypress
        run: npx cypress install

      - name: Build app
        run: npm run build

      - name: Start app server
        run: |
          npm run start > server.log 2>&1 &
          for i in $(seq 1 20); do
            if npx wait-on http://127.0.0.1:3000 --timeout 1000; then
              break
            fi
            echo "Waiting for app server to become ready... ($i/20)"
            sleep 1
          done
          npx wait-on http://127.0.0.1:3000 --timeout 15000

      - name: Run Cypress UI tests
        run: |
          npx cypress run --browser electron || {
            echo "Cypress failed, retrying once...";
            sleep 3;
            npx cypress run --browser electron;
          }

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run load test for 500 users
        env:
          BASE_URL: http://127.0.0.1:3000
        run: k6 run --vus 500 --duration 1m load-test.js

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            server.log
            cypress/screenshots
            cypress/videos
